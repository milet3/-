<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STM32F407 Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;background-image:radial-gradient(ellipse at 50% 0%,#1e3a5f 0%,#0f172a 70%);font-family:system-ui,-apple-system,sans-serif;padding:20px}
.c{width:100%;max-width:420px;background:rgba(30,41,59,.85);backdrop-filter:blur(10px);border-radius:20px;border:1px solid rgba(100,116,139,.3);padding:40px 32px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.h{text-align:center;margin-bottom:32px}
.h h1{color:#f8fafc;font-size:1.6rem;font-weight:700;letter-spacing:-.5px}
.h .l{width:48px;height:3px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:2px;margin:12px auto 0}
.s{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:12px;margin-bottom:24px}
.s .d{width:10px;height:10px;background:#22c55e;border-radius:50%;box-shadow:0 0 12px rgba(34,197,94,.6);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.s span{color:#86efac;font-size:.9rem;font-weight:500}
.i{display:flex;flex-direction:column;gap:14px}
.r{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(15,23,42,.5);border-radius:10px;border:1px solid rgba(51,65,85,.5)}
.r .k{color:#94a3b8;font-size:.82rem}
.r .v{color:#e2e8f0;font-size:.88rem;font-weight:600;font-family:ui-monospace,monospace}
.f{text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid rgba(71,85,105,.4);color:#64748b;font-size:.75rem}
</style>
</head>
<body>
<div class="c">
<div class="h"><h1>STM32F407VET6</h1><div class="l"></div></div>
<div class="s"><div class="d"></div><span>System Running</span></div>
<div class="i">
<div class="r"><span class="k">Platform</span><span class="v">LwIP + FreeRTOS</span></div>
<div class="r"><span class="k">Service</span><span class="v">HTTP Server :80</span></div>
<div class="r"><span class="k">Network</span><span class="v">Ethernet DHCP</span></div>
</div>
<div class="f">Powered by STM32 &bull; LwIP HTTP Server</div>
</div>
</body>
</html>
